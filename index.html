<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - DetectPro AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f4f7fb', 100: '#e1eaf4', 500: '#2563eb', 600: '#1d4ed8', 900: '#1e3a8a' },
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="text-slate-900 dark:bg-slate-900 dark:text-white min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-500/10 rounded-full blur-[120px]"></div>
        <div class="absolute top-1/2 -right-24 w-80 h-80 bg-emerald-500/10 rounded-full blur-[100px]"></div>
    </div>

    <div class="max-w-md w-full z-10">
        <div class="text-center mb-10">
            <div class="w-20 h-20 rounded-[2rem] bg-primary-600 flex items-center justify-center text-white text-4xl shadow-2xl shadow-primary-600/40 mx-auto mb-6">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tight mb-2">DetectPro AI</h1>
            <p class="text-slate-500 dark:text-slate-400 font-medium">Academic Integrity, Redefined.</p>
        </div>

        <div class="glass-card p-10 rounded-[3rem] shadow-2xl">
            <h2 class="text-2xl font-black mb-8">Sign In</h2>
            <form onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2 pl-1">Full Name</label>
                    <input type="text" id="name" required class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl outline-none focus:border-primary-500 transition-all font-bold" placeholder="e.g. Professor Smith">
                </div>
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2 pl-1">Academic Email</label>
                    <input type="email" id="email" required class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl outline-none focus:border-primary-500 transition-all font-bold" placeholder="name@university.edu">
                </div>
                
                <button type="submit" class="w-full py-5 bg-primary-600 hover:bg-primary-700 text-white rounded-2xl font-black shadow-xl shadow-primary-600/30 transition-all transform hover:-translate-y-1 active:scale-95 text-lg">
                    Enter Dashboard <i class="fa-solid fa-arrow-right ml-2 text-sm"></i>
                </button>
            </form>
            
            <div class="mt-8 pt-8 border-t border-slate-100 dark:border-slate-700 text-center">
                <button onclick="document.documentElement.classList.toggle('dark')" class="text-slate-400 hover:text-primary-600 transition-colors">
                    <i class="fa-solid fa-circle-half-stroke mr-2"></i> Switch Theme
                </button>
            </div>
        </div>
        
        <p class="text-center mt-10 text-xs font-bold text-slate-400 uppercase tracking-widest">
            &copy; 2026 DetectPro AI Academic Systems
        </p>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const user = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value
            };
            localStorage.setItem('detectpro_user', JSON.stringify(user));
            window.location.href = 'dashboard.html';
        }

        // Redirect if already logged in
        if (localStorage.getItem('detectpro_user')) {
            window.location.href = 'dashboard.html';
        }
    </script>
    <script src="js/global_chatbot.js"></script>
</body>
</html>
