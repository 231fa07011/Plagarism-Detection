<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Reports & History - DetectPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f4f7fb', 100: '#e1eaf4', 500: '#2563eb', 600: '#1d4ed8', 900: '#1e3a8a' },
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f8fafc; }
        .gauge-transition { transition: stroke-dashoffset 1s ease-out; }
    </style>
</head>
<body class="text-slate-900 dark:bg-slate-900 dark:text-white min-h-screen flex flex-col transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer" onclick="location.href='dashboard.html'">
                    <div class="w-8 h-8 rounded-lg bg-primary-600 flex items-center justify-center text-white">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-900 dark:text-white">DetectPro</span>
                </div>
                
                <div class="hidden md:ml-6 md:flex md:space-x-8 items-center">
                    <a href="dashboard.html" class="text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white font-bold px-1 py-2 border-b-2 border-transparent transition-colors">Dashboard</a>
                    <a href="demo.html" class="text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white font-bold px-1 py-2 border-b-2 border-transparent transition-colors">Demo</a>
                    <a href="checker.html" class="text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white font-bold px-1 py-2 border-b-2 border-transparent transition-colors">Checker</a>
                    <a href="reports.html" class="text-primary-600 dark:text-primary-400 font-bold px-1 py-2 border-b-2 border-primary-600 transition-colors">History</a>
                    <a href="settings.html" class="text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white font-bold px-1 py-2 border-b-2 border-transparent transition-colors">Settings</a>
                </div>

                <div class="flex items-center gap-4">
                    <button onclick="document.documentElement.classList.toggle('dark')" class="text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-white transition-colors">
                        <i class="fa-solid fa-moon dark:hidden text-lg"></i>
                        <i class="fa-solid fa-sun hidden dark:block text-lg"></i>
                    </button>
                    <div class="flex items-center gap-2 pl-4 border-l border-slate-200 dark:border-slate-700 cursor-pointer" onclick="location.href='settings.html'">
                        <div class="w-8 h-8 rounded-full bg-primary-100 dark:bg-slate-800 flex items-center justify-center text-primary-600 font-black text-sm" id="user-initial">U</div>
                        <span class="text-sm font-bold hidden sm:block" id="user-name-display">User</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex flex-col bg-slate-50 dark:bg-slate-900 overflow-y-auto">
        
        <!-- HISTORY LIST VIEW -->
        <div id="list-view" class="p-6 md:p-12">
            <div class="max-w-6xl mx-auto w-full">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-4xl font-black tracking-tight">Full Scan History</h2>
                    <button onclick="clearHistory()" class="text-sm text-red-600 hover:text-red-700 font-bold px-6 py-3 bg-red-50 rounded-xl transition-all border border-red-100 hover:shadow-lg">
                        <i class="fa-solid fa-trash-can mr-2"></i> Clear All
                    </button>
                </div>
                
                <div class="bg-white dark:bg-slate-800 rounded-[2.5rem] border border-slate-200 dark:border-slate-700 overflow-hidden shadow-xl">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 dark:bg-slate-900/50 text-slate-500 text-xs font-black uppercase tracking-widest border-b border-slate-200 dark:border-slate-700">
                                <th class="px-8 py-6">Date & Time</th>
                                <th class="px-8 py-6">Content Preview</th>
                                <th class="px-8 py-6 text-center">Score</th>
                                <th class="px-8 py-6 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="history-table" class="divide-y divide-slate-100 dark:divide-slate-700/50"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- DETAILED REPORT VIEW -->
        <div id="report-view" class="p-6 md:p-12 hidden">
            <div class="max-w-7xl mx-auto w-full">
                <div class="flex flex-wrap items-center justify-between mb-10 gap-4">
                    <button onclick="showListView()" class="px-6 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-2xl font-black shadow-sm transition-all hover:bg-slate-50 flex items-center gap-3">
                        <i class="fa-solid fa-arrow-left"></i> Back to History
                    </button>
                    <div class="flex gap-4">
                        <button onclick="window.print()" class="px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white rounded-2xl font-black shadow-lg shadow-primary-600/30 transition-all flex items-center gap-3">
                            <i class="fa-solid fa-print"></i> Print Report
                        </button>
                    </div>
                </div>

                <!-- Analysis Header Cards -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
                    <div class="bg-white dark:bg-slate-800 p-10 rounded-[3rem] border border-slate-200 dark:border-slate-700 shadow-lg flex flex-col md:flex-row items-center gap-10">
                        <div class="relative w-48 h-48">
                            <svg class="w-full h-full transform -rotate-90">
                                <circle cx="96" cy="96" r="80" stroke="currentColor" stroke-width="14" fill="transparent" class="text-slate-100 dark:text-slate-700" />
                                <circle id="report-gauge" cx="96" cy="96" r="80" stroke="currentColor" stroke-width="14" fill="transparent" stroke-dasharray="502.6" stroke-dashoffset="502.6" class="text-primary-600 gauge-transition" />
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <span id="report-score" class="text-5xl font-black text-slate-900 dark:text-white">0%</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Similarity</span>
                            </div>
                        </div>
                        <div class="flex-1 text-center md:text-left">
                            <h3 id="report-title" class="text-2xl font-black mb-3">Analysis Result</h3>
                            <p id="report-date" class="text-slate-500 font-medium text-sm mb-6">Scanning academic databases...</p>
                            <div class="flex flex-wrap gap-2 justify-center md:justify-start">
                                <button onclick="filterContent('all')" id="filter-btn-all" class="px-4 py-2 bg-primary-600 text-white text-xs font-black rounded-xl border border-primary-600 transition-all shadow-sm transform scale-105">ALL TEXT</button>
                                <button onclick="filterContent('exact')" id="filter-btn-exact" class="px-4 py-2 bg-red-50 text-red-600 hover:bg-red-100 text-xs font-black rounded-xl border border-red-100 transition-all">EXACT MATCHES</button>
                                <button onclick="filterContent('paraphrase')" id="filter-btn-para" class="px-4 py-2 bg-orange-50 text-orange-600 hover:bg-orange-100 text-xs font-black rounded-xl border border-orange-100 transition-all">PARAPHRASED</button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-slate-800 p-10 rounded-[3rem] border border-slate-200 dark:border-slate-700 shadow-lg">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-8">Match Breakdown</h3>
                        <div id="sources-summary" class="space-y-4"></div>
                    </div>
                </div>

                <!-- Document Review -->
                <div class="bg-white dark:bg-slate-800 p-10 md:p-16 rounded-[4rem] border border-slate-200 dark:border-slate-700 shadow-2xl">
                    <h3 class="text-lg font-black mb-10 pb-6 border-b border-slate-100 dark:border-slate-700 flex items-center gap-4">
                        <i class="fa-solid fa-file-lines text-primary-500 text-2xl"></i> Document Content Review
                    </h3>
                    <div id="report-content" class="text-xl leading-[1.8] font-serif space-y-6"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const userStr = localStorage.getItem('detectpro_user');
        if (!userStr) window.location.href = 'index.html';
        const user = JSON.parse(userStr);
        document.getElementById('user-name-display').innerText = user.name;
        document.getElementById('user-initial').innerText = user.name.charAt(0).toUpperCase();

        function loadHistory() {
            const table = document.getElementById('history-table');
            const history = JSON.parse(localStorage.getItem('dp_history_v2') || '[]');
            table.innerHTML = '';
            
            if (!history.length) {
                table.innerHTML = '<tr><td colspan="4" class="text-center py-24 text-slate-400 font-bold text-xl"><i class="fa-solid fa-folder-open block text-5xl mb-4 text-slate-200"></i> No reports saved yet.</td></tr>';
                return;
            }
            
            history.forEach((h, index) => {
                const color = h.plagiarismScore > 50 ? 'bg-red-50 text-red-600 border-red-100' : (h.plagiarismScore > 20 ? 'bg-orange-50 text-orange-600 border-orange-100' : 'bg-green-50 text-green-600 border-green-100');
                table.innerHTML += `
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-900/50 transition-all cursor-pointer group" onclick="viewSpecificReport(${index})">
                        <td class="px-8 py-8">
                            <div class="font-black text-slate-900 dark:text-white">${h.date.split(',')[0]}</div>
                            <div class="text-xs text-slate-400 font-bold uppercase tracking-wider">${h.date.split(',')[1]}</div>
                        </td>
                        <td class="px-8 py-8 max-w-sm">
                            <div class="text-sm font-medium text-slate-600 dark:text-slate-400 italic truncate italic">"${h.textSnippet}"</div>
                        </td>
                        <td class="px-8 py-8 text-center">
                            <span class="inline-flex px-6 py-2 rounded-xl border font-black text-sm shadow-sm ${color}">${h.plagiarismScore}%</span>
                        </td>
                        <td class="px-8 py-8 text-right">
                             <div class="flex justify-end gap-3 transition-opacity">
                                <button onclick="event.stopPropagation(); deleteItem(${index})" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition-colors">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                                <button class="px-5 py-2 bg-primary-600 text-white rounded-xl font-black text-xs">OPEN</button>
                             </div>
                        </td>
                    </tr>
                `;
            });
        }

        function viewSpecificReport(index) {
            const history = JSON.parse(localStorage.getItem('dp_history_v2') || '[]');
            const r = history[index];
            showReportView(r);
        }

        let currentViewingReport = null;

        function showReportView(r) {
            currentViewingReport = r;
            document.getElementById('list-view').classList.add('hidden');
            document.getElementById('report-view').classList.remove('hidden');
            
            document.getElementById('report-score').innerText = `${r.plagiarismScore}%`;
            document.getElementById('report-date').innerText = `Scanned on ${r.date}`;
            
            const gauge = document.getElementById('report-gauge');
            const circumference = 2 * Math.PI * 80;
            gauge.style.strokeDashoffset = circumference - (r.plagiarismScore / 100) * circumference;

            // Sources summary
            const sourcesDiv = document.getElementById('sources-summary');
            sourcesDiv.innerHTML = '';
            const topSources = {};
            r.results.forEach(m => { if(m.source) topSources[m.source.title] = (topSources[m.source.title] || 0) + 1; });
            
            const sorted = Object.entries(topSources).sort((a,b) => b[1] - a[1]);
            if (sorted.length) {
                sorted.slice(0, 3).forEach(([title, count]) => {
                    sourcesDiv.innerHTML += `
                        <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-700">
                            <span class="font-bold text-sm truncate pr-4">${title}</span>
                            <span class="text-xs font-black text-primary-600 py-1 px-3 bg-primary-50 rounded-lg">${count} Matches</span>
                        </div>
                    `;
                });
            } else {
                sourcesDiv.innerHTML = '<p class="text-sm font-medium text-slate-400 italic">No external matches identified.</p>';
            }

            // Content review
            filterContent('all');
        }

        function filterContent(type) {
            if (!currentViewingReport) return;
            
            // Update button styles
            document.getElementById('filter-btn-all').className = type === 'all' 
                ? 'px-4 py-2 bg-primary-600 text-white text-xs font-black rounded-xl border border-primary-600 transition-all shadow-sm transform scale-105' 
                : 'px-4 py-2 bg-slate-50 text-slate-600 hover:bg-slate-100 dark:bg-slate-800 dark:text-slate-300 dark:border-slate-700 text-xs font-black rounded-xl border border-slate-200 transition-all';
                
            document.getElementById('filter-btn-exact').className = type === 'exact' 
                ? 'px-4 py-2 bg-red-600 text-white text-xs font-black rounded-xl border border-red-600 transition-all shadow-sm transform scale-105' 
                : 'px-4 py-2 bg-red-50 text-red-600 hover:bg-red-100 text-xs font-black rounded-xl border border-red-100 transition-all';
                
            document.getElementById('filter-btn-para').className = type === 'paraphrase' 
                ? 'px-4 py-2 bg-orange-600 text-white text-xs font-black rounded-xl border border-orange-600 transition-all shadow-sm transform scale-105' 
                : 'px-4 py-2 bg-orange-50 text-orange-600 hover:bg-orange-100 text-xs font-black rounded-xl border border-orange-100 transition-all';

            const contentDiv = document.getElementById('report-content');
            contentDiv.innerHTML = '';
            currentViewingReport.results.forEach(m => {
                const isHighlighted = type === 'all' || m.type === type;
                let color = '';
                
                if (isHighlighted) {
                    if (m.type === 'exact') color = 'bg-red-100 text-red-900 border-red-200';
                    else if (m.type === 'paraphrase') color = 'bg-orange-100 text-orange-900 border-orange-200';
                }
                
                const cursor = isHighlighted && m.type !== 'none' ? 'cursor-help' : '';
                const title = isHighlighted && m.source ? `title="Source: ${m.source.title}"` : '';
                const opacity = (!isHighlighted && m.type !== 'none') ? 'opacity-40 grayscale' : '';
                
                const span = `<span class="px-1 rounded-md border-b-2 ${color} ${cursor} ${opacity} transition-all duration-300" ${title}>${m.text}</span> `;
                contentDiv.innerHTML += span;
            });
        }

        function showListView() {
            document.getElementById('list-view').classList.remove('hidden');
            document.getElementById('report-view').classList.add('hidden');
            loadHistory();
        }

        function deleteItem(index) {
            if(confirm('Delete report?')) {
                let history = JSON.parse(localStorage.getItem('dp_history_v2') || '[]');
                history.splice(index, 1);
                localStorage.setItem('dp_history_v2', JSON.stringify(history));
                loadHistory();
            }
        }

        function clearHistory() {
            if(confirm('Clear all?')) { localStorage.removeItem('dp_history_v2'); loadHistory(); }
        }

        // Check for current report (coming from checker)
        const current = JSON.parse(localStorage.getItem('dp_current_report'));
        if (current) {
            localStorage.removeItem('dp_current_report'); // Consume it
            showReportView(current);
        } else {
            loadHistory();
        }
    </script>
</body>
</html>
